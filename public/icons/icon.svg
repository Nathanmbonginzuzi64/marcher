<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Bouillie Shop">
  <defs>
    <linearGradient id="bg" x1="48" y1="32" x2="464" y2="480" gradientUnits="userSpaceOnUse">
      <stop stop-color="#34d399"/>
      <stop offset="1" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="porridge" x1="256" y1="210" x2="256" y2="270" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fde68a"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Cart handle -->
  <path
    d="M352 176c54-6 86 34 74 88"
    fill="none"
    stroke="#ffffff"
    stroke-width="24"
    stroke-linecap="round"
  />

  <!-- Cart body -->
  <path
    d="M148 196h216l-30 196H178L148 196z"
    fill="#ffffff"
  />
  <path
    d="M148 196h216l-30 196H178L148 196z"
    fill="none"
    stroke="#d1fae5"
    stroke-width="5"
  />

  <!-- Wheels -->
  <circle cx="206" cy="412" r="30" fill="#ffffff"/>
  <circle cx="206" cy="412" r="13" fill="#059669"/>
  <circle cx="326" cy="412" r="30" fill="#ffffff"/>
  <circle cx="326" cy="412" r="13" fill="#059669"/>

  <!-- Bowl rim -->
  <ellipse cx="256" cy="262" rx="96" ry="22" fill="#f9fafb"/>

  <!-- Bowl body -->
  <path
    d="M164 262c0 62 41 108 92 108s92-46 92-108"
    fill="#ffffff"
  />

  <!-- Porridge -->
  <ellipse cx="256" cy="262" rx="78" ry="18" fill="url(#porridge)"/>

  <!-- Plate under bowl -->
  <ellipse cx="256" cy="352" rx="110" ry="16" fill="#ffffff" opacity="0.9"/>

  <!-- Steam -->
  <path d="M232 214c0-18 10-26 10-42" fill="none" stroke="#ffffff" stroke-width="9" stroke-linecap="round" opacity="0.85"/>
  <path d="M256 204c0-22 10-30 10-46" fill="none" stroke="#ffffff" stroke-width="9" stroke-linecap="round" opacity="0.85"/>
  <path d="M280 214c0-18 10-26 10-42" fill="none" stroke="#ffffff" stroke-width="9" stroke-linecap="round" opacity="0.85"/>
</svg>
